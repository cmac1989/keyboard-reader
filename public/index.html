<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Silksong Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<svg style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="sketch" x="-15%" y="-15%" width="130%" height="130%">
            <feTurbulence type="fractalNoise" baseFrequency="0.075" numOctaves="3" result="noise" seed="8"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur-wide"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="1"   result="blur-tight"/>
            <feMerge>
                <feMergeNode in="blur-wide"/>
                <feMergeNode in="blur-tight"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
</svg>

<div id="overlay">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="header">
        <div class="header-line"></div>
        <svg class="emblem-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M20,2 L22.5,17.5 L38,20 L22.5,22.5 L20,38 L17.5,22.5 L2,20 L17.5,17.5 Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M20,8 L21.5,18.5 L32,20 L21.5,21.5 L20,32 L18.5,21.5 L8,20 L18.5,18.5 Z" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round" opacity="0.45"/>
        </svg>
        <div class="header-line"></div>
        <button id="close-btn" title="Quit">✕</button>
    </div>

    <div id="groups" class="groups"></div>

    <div class="switcher">
        <button id="prev-layout">&#8249;</button>
        <span id="layout-name"></span>
        <button id="next-layout">&#8250;</button>
    </div>
</div>

<script src="layouts.js"></script>
<script src="script.js"></script>
</body>
</html>
