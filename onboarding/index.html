<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Setup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="emblem">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M20,2 L22.5,17.5 L38,20 L22.5,22.5 L20,38 L17.5,22.5 L2,20 L17.5,17.5 Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M20,8 L21.5,18.5 L32,20 L21.5,21.5 L20,32 L18.5,21.5 L8,20 L18.5,18.5 Z" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round" opacity="0.45"/>
        </svg>
    </div>

    <h1>Welcome</h1>
    <p class="subtitle" id="subtitle"></p>

    <div class="steps" id="steps"></div>

    <p class="hint" id="hint"></p>

    <button class="done-btn" onclick="window.close()">Done — Launch Overlay</button>
</div>

<script>
const CONTENT = {
    darwin: {
        subtitle: 'Two permissions are required to capture keyboard input.',
        steps: [
            {
                n: '1',
                title: 'Accessibility',
                desc: 'Allows the app to monitor global keyboard events.',
                btn: 'Open System Settings →',
                ipc: 'openAccessibility',
            },
            {
                n: '2',
                title: 'Input Monitoring',
                desc: 'Required for capturing keystrokes outside the app.',
                btn: 'Open System Settings →',
                ipc: 'openInputMonitoring',
            },
        ],
        hint: 'In each panel, click <strong>+</strong> and add <strong>your terminal app</strong> (Terminal, iTerm2, or whichever you use to launch this app), then enable the toggle.',
    },
    win32: {
        subtitle: 'No special permissions needed on Windows — pynput works out of the box.',
        steps: [
            {
                n: '1',
                title: 'Install Python',
                desc: 'Download and install Python from python.org. Make sure to check "Add Python to PATH" during installation.',
                btn: 'python.org →',
                url: 'https://python.org/downloads',
            },
            {
                n: '2',
                title: 'Install pynput',
                desc: 'Open a terminal and run: pip install pynput',
                btn: null,
            },
        ],
        hint: 'Once Python and pynput are installed, close this window and the overlay will start capturing input.',
    },
    default: {
        subtitle: 'Ensure Python 3 and pynput are installed to capture keyboard input.',
        steps: [
            {
                n: '1',
                title: 'Install pynput',
                desc: 'Run: pip3 install pynput',
                btn: null,
            },
        ],
        hint: 'You may also need to grant your terminal Accessibility or Input Monitoring permissions in your system settings.',
    },
};

async function init() {
    const platform = await window.electronAPI.platform();
    const c = CONTENT[platform] || CONTENT.default;

    document.getElementById('subtitle').textContent = c.subtitle;
    document.getElementById('hint').innerHTML = c.hint;

    const stepsEl = document.getElementById('steps');
    c.steps.forEach(s => {
        const step = document.createElement('div');
        step.className = 'step';
        step.innerHTML = `
            <div class="step-number">${s.n}</div>
            <div class="step-body">
                <div class="step-title">${s.title}</div>
                <div class="step-desc">${s.desc}</div>
                ${s.btn ? `<button class="step-btn" data-ipc="${s.ipc || ''}" data-url="${s.url || ''}">${s.btn}</button>` : ''}
            </div>
        `;
        stepsEl.appendChild(step);
    });

    stepsEl.querySelectorAll('.step-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (btn.dataset.ipc) window.electronAPI[btn.dataset.ipc]();
            else if (btn.dataset.url) window.electronAPI.openUrl(btn.dataset.url);
        });
    });
}

init();
</script>
</body>
</html>
